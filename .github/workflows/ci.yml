name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustpress-net/rustpress-core-devops/actions/ci-node@main
        with:
          node_version: '20'
          test_command: 'npx jest'
          # The SDK has no separate `build` script (CJS-only, 1.0); skip.
          run_build: 'false'
